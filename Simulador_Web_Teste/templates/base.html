<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}Simulador Comercial{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
  {% block extra_css %}{% endblock %}
</head>
<body>

<div class="container">
  <aside class="sidebar">
    <div class="logo">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Logo">
    </div>

    <a href="{{ url_for('index') }}" class="menu-link">
      <p class="menu-item">Propostas</p>
    </a>

    <p class="menu-item" onclick="toggleMenu()">Bases ▾</p>

    <div id="submenu" class="submenu" style="display:block;">
      <a href="{{ url_for('cct') }}" class="menu-link">
        <p class="submenu-item">Base de CCT</p>
      </a>
      <a href="#" class="menu-link">
        <p class="submenu-item">Custos</p>
      </a>
      <a href="#" class="menu-link">
        <p class="submenu-item">Uniformes</p>
      </a>
    </div>

    <a href="#" class="menu-link">
      <p class="menu-item">Relatórios</p>
    </a>
  </aside>

  <main class="content">
    {% block content %}{% endblock %}
  </main>
</div>

<script>
function toggleMenu() {
  const menu = document.getElementById("submenu");
  menu.style.display = (menu.style.display === "block") ? "none" : "block";
}
</script>

{% block extra_js %}{% endblock %}
</body>
</html>
